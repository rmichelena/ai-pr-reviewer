name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run AI Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'openrouter' }}
          REVIEW_MODELS: ${{ vars.REVIEW_MODELS || 'deepseek/deepseek-v4-flash,deepseek/deepseek-v4-flash,deepseek/deepseek-v4-flash' }}
          VALIDATOR_MODEL: ${{ vars.VALIDATOR_MODEL || 'deepseek/deepseek-v4-flash' }}
          NUM_PASSES: ${{ vars.NUM_PASSES || '3' }}
          MIN_VOTES: ${{ vars.MIN_VOTES || '2' }}
          MAX_DIFF_LINES: ${{ vars.MAX_DIFF_LINES || '5000' }}
        run: python scripts/ai_review.py
